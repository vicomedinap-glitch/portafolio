name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deployment artifact
        run: |
          mkdir -p deploy
          rsync -av --exclude='.github' --exclude='.git' --exclude='README.md' --exclude='deploy.yml' --exclude='.gitignore' --exclude='node_modules' ./ deploy/

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: deploy

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
