<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <linearGradient id="corkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b88b61" />
      <stop offset="100%" stop-color="#8d6d4e" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#corkGrad)" />
  <g filter="url(#grain)">
    <rect width="100%" height="100%" fill-opacity="0.07" fill="#000" />
  </g>
  <!-- subtle speckles -->
  <g fill="#6b4f3b" opacity="0.06">
    <circle cx="120" cy="80" r="3"/>
    <circle cx="260" cy="200" r="2"/>
    <circle cx="520" cy="120" r="2.6"/>
    <circle cx="760" cy="520" r="3.2"/>
    <circle cx="980" cy="280" r="2"/>
    <circle cx="360" cy="480" r="2.6"/>
  </g>
</svg>
